name: NodeJS with Webpack
env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

obs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4        # Node.js 20 compatible
      - uses: actions/setup-node@v4      # Node.js 20 compatible
        with:
          node-version: '20'
      - uses: actions/cache@v4           # Node.js 20 compatible
      - uses: actions/upload-artifact@v4 # Node.js 20 compatible-
name: Build
run: |
npm install 
npx webpack
